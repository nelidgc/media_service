services:
  caddy:
    image: caddy:latest
    container_name: caddy

    ports:
      - "80:80"
      - "443:443"

    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - ./data:/data
      - ./config:/config

    restart: unless-stopped

    networks:
      - media_net

networks:
  media_net:
    external: true